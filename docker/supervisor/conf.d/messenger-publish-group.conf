[program:messenger-publish-group]
command=php /var/www/html/app/bin/console messenger:consume publish_group_jobs --limit=100 --memory-limit=128M
process_name=%(program_name)s_%(process_num)02d
numprocs=3
autostart=true
autorestart=true
startsecs=5
startretries=3
priority=20
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
