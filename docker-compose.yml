services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - backend

  php:
    image: context-php:latest
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      network: host
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-prod}
      APP_DEBUG: ${APP_DEBUG:-0}
      USE_LOCAL_OLLAMA: ${USE_LOCAL_OLLAMA:-true}
      RUNPOD_API_KEY: ${RUNPOD_API_KEY:-}
      RUNPOD_ENDPOINT_ID: ${RUNPOD_ENDPOINT_ID:-}
      RUNPOD_ENDPOINT_ID_AGGREGATION: ${RUNPOD_ENDPOINT_ID_AGGREGATION:-}
      RUNPOD_ENDPOINT_ID_DAILY: ${RUNPOD_ENDPOINT_ID_DAILY:-}
      DB_HOST: db
      DB_DATABASE: ${POSTGRES_DB}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST:-/}
      MESSENGER_TRANSPORT_DSN: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672${RABBITMQ_VHOST:-/}
      REDIS_URL: redis://redis:6379
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET}
      TELEGRAM_BOT_LINK: ${TELEGRAM_BOT_LINK}
      ADMIN_TELEGRAM_USER_ID: ${ADMIN_TELEGRAM_USER_ID}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_API_BASE_URL: ${DEEPSEEK_API_BASE_URL:-https://api.deepseek.com/v1}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
      APP_PUBLIC_URL: ${APP_PUBLIC_URL:-}
    volumes:
      - ./:/var/www/html
    networks:
      - backend
    depends_on:
      - db
      - rabbitmq
      - redis

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - backend

  rabbitmq:
    image: rabbitmq:3-management
    restart: unless-stopped
    env_file:
      - .env
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-/}
    ports:
      - "127.0.0.1:15672:15672"
      - "127.0.0.1:5672:5672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - backend

  worker:
    image: context-php:latest
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      network: host
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-prod}
      APP_DEBUG: ${APP_DEBUG:-0}
      USE_LOCAL_OLLAMA: ${USE_LOCAL_OLLAMA:-true}
      RUNPOD_API_KEY: ${RUNPOD_API_KEY:-}
      RUNPOD_ENDPOINT_ID: ${RUNPOD_ENDPOINT_ID:-}
      RUNPOD_ENDPOINT_ID_AGGREGATION: ${RUNPOD_ENDPOINT_ID_AGGREGATION:-}
      RUNPOD_ENDPOINT_ID_DAILY: ${RUNPOD_ENDPOINT_ID_DAILY:-}
      DB_HOST: db
      DB_DATABASE: ${POSTGRES_DB}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST:-/}
      MESSENGER_TRANSPORT_DSN: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672${RABBITMQ_VHOST:-/}
      REDIS_URL: redis://redis:6379
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET}
      TELEGRAM_BOT_LINK: ${TELEGRAM_BOT_LINK}
      ADMIN_TELEGRAM_USER_ID: ${ADMIN_TELEGRAM_USER_ID}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_API_BASE_URL: ${DEEPSEEK_API_BASE_URL:-https://api.deepseek.com/v1}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
      APP_PUBLIC_URL: ${APP_PUBLIC_URL:-}
    volumes:
      - ./:/var/www/html
      - ./docker/cron/crontab:/etc/crontabs/root:ro
      - ./docker/supervisor/supervisord.conf:/etc/supervisor/supervisord.conf:ro
      - ./docker/supervisor/conf.d:/etc/supervisor/conf.d:ro
    command: supervisord -c /etc/supervisor/supervisord.conf
    networks:
      - backend
    depends_on:
      - db
      - rabbitmq
      - redis

  nginx:
    image: context-nginx:latest
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
      network: host
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      NGINX_SERVER_NAME: ${NGINX_SERVER_NAME:-localhost}
      NGINX_ENVSUBST_TEMPLATE_VARS: NGINX_SERVER_NAME
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro
    depends_on:
      - php
    networks:
      - backend

