framework:
    messenger:
        failure_transport: failed

        transports:
            incoming_messages:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                options:
                    exchange:
                        name: incoming_messages
                        type: direct
                        default_publish_routing_key: incoming_messages
                    queues:
                        incoming_messages:
                            binding_keys: [incoming_messages]
                retry_strategy:
                    max_retries: 3
                    delay: 1000
                    multiplier: 2
                    jitter: 0

            summary_jobs:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                options:
                    exchange:
                        name: summary_jobs
                        type: direct
                        default_publish_routing_key: summary_jobs
                    queues:
                        summary_jobs:
                            binding_keys: [summary_jobs]
                retry_strategy:
                    max_retries: 3
                    delay: 1000
                    multiplier: 2
                    jitter: 0

            aggregation_checks:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                options:
                    exchange:
                        name: aggregation_checks
                        type: direct
                        default_publish_routing_key: aggregation_checks
                    queues:
                        aggregation_checks:
                            binding_keys: [aggregation_checks]
                retry_strategy:
                    max_retries: 3
                    delay: 1000
                    multiplier: 2
                    jitter: 0

            daily_aggregation_checks:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                options:
                    exchange:
                        name: daily_aggregation_checks
                        type: direct
                        default_publish_routing_key: daily_aggregation_checks
                    queues:
                        daily_aggregation_checks:
                            binding_keys: [daily_aggregation_checks]
                retry_strategy:
                    max_retries: 3
                    delay: 5000
                    multiplier: 2
                    jitter: 0

            publish_group_jobs:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                options:
                    exchange:
                        name: publish_group_jobs
                        type: direct
                        default_publish_routing_key: publish_group_jobs
                    queues:
                        publish_group_jobs:
                            binding_keys: [publish_group_jobs]
                retry_strategy:
                    max_retries: 5
                    delay: 30000     # 30s — покрывает типичный retry_after от Telegram при 429
                    multiplier: 2
                    max_delay: 300000 # не более 5 минут
                    jitter: 0

            publish_dm_jobs:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                options:
                    exchange:
                        name: publish_dm_jobs
                        type: direct
                        default_publish_routing_key: publish_dm_jobs
                    queues:
                        publish_dm_jobs:
                            binding_keys: [publish_dm_jobs]
                retry_strategy:
                    max_retries: 5
                    delay: 30000
                    multiplier: 2
                    max_delay: 300000
                    jitter: 0

            ai_deepseek_jobs:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                options:
                    exchange:
                        name: ai_deepseek_jobs
                        type: direct
                        default_publish_routing_key: ai_deepseek_jobs
                    queues:
                        ai_deepseek_jobs:
                            binding_keys: [ai_deepseek_jobs]
                retry_strategy:
                    max_retries: 3
                    delay: 5000
                    multiplier: 2
                    jitter: 0

            ai_reply_send:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                options:
                    exchange:
                        name: ai_reply_send
                        type: direct
                        default_publish_routing_key: ai_reply_send
                    queues:
                        ai_reply_send:
                            binding_keys: [ai_reply_send]
                retry_strategy:
                    max_retries: 5
                    delay: 10000
                    multiplier: 2
                    max_delay: 120000
                    jitter: 0

            failed:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                options:
                    exchange:
                        name: failed
                        type: direct
                        default_publish_routing_key: failed
                    queues:
                        failed:
                            binding_keys: [failed]

        routing:
            App\Message\IncomingTelegramUpdateMessage:    incoming_messages
            App\Message\SummaryJobMessage:                summary_jobs
            App\Message\CheckAggregationMessage:          aggregation_checks
            App\Message\GenerateDailyAggregationMessage:  daily_aggregation_checks
            App\Message\PublishGroupJobMessage:           publish_group_jobs
            App\Message\PublishDmJobMessage:              publish_dm_jobs
            App\Message\MessageForAiDeepSeekMessage:      ai_deepseek_jobs
            App\Message\AiReplySendMessage:               ai_reply_send
